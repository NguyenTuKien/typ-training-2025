services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports: [ "3306:3306" ]
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=TestAcc@1234
      - MYSQL_DATABASE=shop1
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=TestAcc@1234
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "admin", "-pTestAcc@1234" ]
      timeout: 10s
      retries: 10
      interval: 5s
    networks:
      - default

  backend:
    build: ./Backend
    container_name: backend
    ports: ["8080:8080"]
    volumes:
      - ./Backend/.m2:/root/.m2
      - ./Backend/logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - spring.datasource.url=jdbc:mysql://mysql:3306/shop1?createDatabaseIfNotExist=true
      - spring.datasource.username=admin
      - spring.datasource.password=TestAcc@1234
    networks:
      - default

  front-end:
    build: ./Frontend
    container_name: frontend
    ports:
      - "5173:5173"
    networks:
      - default

volumes:
  mysql-data:

networks:
  default: